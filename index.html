<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSM World Map - Speed Cameras & Hazards</title>
    
    <!-- CSS Reset & Main Styles -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
          crossorigin=""/>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" 
            crossorigin=""></script>

    <!-- osmtogeojson -->
    <script src="https://unpkg.com/osmtogeojson@3.0.0-beta.5/osmtogeojson.js"></script>
</head>
<body>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- UI Overlay: Legend & Controls -->
    <div class="ui-overlay">
        <div class="panel">
            <h1>OSM Live Map</h1>
            <p class="status" id="status-text">Zoom in to load data (Level 12+)</p>
            
            <div class="controls">
                <label class="control-item">
                    <input type="checkbox" id="toggle-cameras" checked>
                    <span class="dot camera"></span>
                    Speed Cameras
                </label>
                <label class="control-item">
                    <input type="checkbox" id="toggle-signals" checked>
                    <span class="dot signal"></span>
                    Traffic Signals
                </label>
                <label class="control-item">
                    <input type="checkbox" id="toggle-hazards" checked>
                    <span class="dot hazard"></span>
                    Hazards
                </label>
            </div>
            
            <div class="legend">
                <small>Moves map to fetch fresh data.</small>
            </div>
        </div>
    </div>

    <!-- Application Logic -->
    <script src="main.js"></script>
</body>
</html>
